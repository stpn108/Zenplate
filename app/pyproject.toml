[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
# F: Pyflakes — catches undefined names, unused imports, redefined names
# E9: Runtime errors (syntax errors, etc.)
# W6: Deprecated features
select = ["F", "E9", "W6"]

# F811: parameter names shadowing builtins — harmless in many contexts
# F401: unused imports — too noisy to enforce initially, enable later
# F541: f-string without placeholders — cosmetic, not a bug
# F841: unused local variable — mostly `except Exception as e` patterns
ignore = ["F811", "F401", "F541", "F841"]

[tool.ruff.lint.per-file-ignores]
# Test files may import without using directly (fixtures, conftest re-exports)
"tests/*" = ["F401"]
